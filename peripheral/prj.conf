CONFIG_BT=y
CONFIG_LOG=y
CONFIG_BT_SMP=n
# CONFIG_BT_DIS=y
# CONFIG_BT_ATT_PREPARE_COUNT=5
# CONFIG_BT_BAS=y
# CONFIG_BT_HRS=y
# CONFIG_BT_IAS=y
# CONFIG_BT_CTS=y
# CONFIG_BT_CTS_HELPER_API=y
# CONFIG_BT_PRIVACY=y
CONFIG_BT_DEVICE_NAME="rf5840"
CONFIG_BT_PERIPHERAL=y
# CONFIG_BT_DEVICE_APPEARANCE=833
# CONFIG_BT_DEVICE_NAME_DYNAMIC=y
# CONFIG_BT_DEVICE_NAME_MAX=65

# CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
# CONFIG_BT_SETTINGS=y
# CONFIG_FLASH=y
# CONFIG_FLASH_MAP=y
# CONFIG_NVS=y
# CONFIG_SETTINGS=y

CONFIG_GPIO=y
CONFIG_PWM=y

#enable multiple connectiosn
CONFIG_BT_MAX_CONN=1

# This allows the stack to handle multiple identities (MAC addresses)
CONFIG_BT_ID_MAX=5

# 4. Enable Random Number Generation (Required for sys_rand32_get)
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# 5. Kernel Workqueue (Usually on by default, but essential for our logic)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048


